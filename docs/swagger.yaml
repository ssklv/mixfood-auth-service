basePath: /
definitions:
  domain.Address:
    properties:
      apartment:
        type: string
      door_code:
        type: string
      entrance:
        type: string
      floor:
        type: string
      id:
        type: integer
      street_house:
        type: string
      user_id:
        type: integer
    type: object
  domain.UpdateAddressParams:
    properties:
      apartment:
        type: string
      door_code:
        type: string
      entrance:
        type: string
      floor:
        type: string
      street_house:
        type: string
    type: object
  domain.UpdateUserParams:
    properties:
      email:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  domain.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      role:
        $ref: '#/definitions/domain.UserRole'
      updatedAt:
        type: string
    type: object
  domain.UserRole:
    enum:
    - user
    - admin
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleAdmin
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.deleteAddressReq:
    properties:
      id:
        type: integer
    type: object
  handlers.loginReq:
    properties:
      password:
        example: secret123
        type: string
      phone:
        example: "79991234567"
        type: string
    type: object
  handlers.registerReq:
    properties:
      name:
        example: Ivan
        type: string
      password:
        example: secret123
        type: string
      phone:
        example: "79991234567"
        type: string
    type: object
  handlers.tokenResponse:
    properties:
      accessToken:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Authentication and user management microservice API.
  title: Mixfood Auth Service API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user via phone and password. Sets authentication
        tokens in httpOnly cookies.
      parameters:
      - description: User Credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: Returns accessToken in JSON format
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Invalid phone number or password
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: User Login
      tags:
      - Auth
  /api/auth/logout:
    post:
      description: Deletes active session from database and clears authorization cookies
        on the client side.
      responses:
        "204":
          description: Successfully logged out (No Content)
        "404":
          description: Active session not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to logout
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User Logout
      tags:
      - Auth
  /api/auth/refresh:
    get:
      description: Accepts refresh_token from cookies, validates it, and issues a
        new pair of tokens.
      responses:
        "200":
          description: Tokens successfully refreshed
        "401":
          description: Session expired or invalid
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Refresh Session Tokens
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account, generates JWT tokens, and sets them
        in httpOnly cookies.
      parameters:
      - description: Registration Data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.registerReq'
      produces:
      - application/json
      responses:
        "201":
          description: Returns accessToken in JSON format
          schema:
            $ref: '#/definitions/handlers.tokenResponse'
        "400":
          description: Invalid request body or weak password
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Phone number already registered
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: User Registration
      tags:
      - Auth
  /api/user/address:
    delete:
      consumes:
      - application/json
      description: Removes a delivery address from the user's list by its ID.
      parameters:
      - description: Target address ID to delete
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.deleteAddressReq'
      produces:
      - application/json
      responses:
        "204":
          description: Address successfully deleted (No Content)
        "400":
          description: Invalid request body or non-positive ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Address not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to delete address
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete Delivery Address
      tags:
      - User
    post:
      consumes:
      - application/json
      description: Adds a new delivery address associated with the current user.
      parameters:
      - description: Address Data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/domain.Address'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created address object
          schema:
            $ref: '#/definitions/domain.Address'
        "400":
          description: Invalid address validation parameters
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to create address
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create Delivery Address
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Modifies fields of an existing delivery address.
      parameters:
      - description: Address Data for Partial Update
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateAddressParams'
      produces:
      - application/json
      responses:
        "200":
          description: Address successfully updated
        "400":
          description: Invalid address validation parameters
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Address not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to update address
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Delivery Address
      tags:
      - User
  /api/user/addresses:
    get:
      description: Retrieves all saved delivery addresses for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: Array of delivery addresses
          schema:
            items:
              $ref: '#/definitions/domain.Address'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Delivery Addresses
      tags:
      - User
  /api/user/me:
    get:
      description: Returns profile data of the authenticated user based on ID from
        token.
      produces:
      - application/json
      responses:
        "200":
          description: User profile object
          schema:
            $ref: '#/definitions/domain.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get Current User Profile
      tags:
      - User
  /api/user/profile:
    patch:
      consumes:
      - application/json
      description: Partially updates user profile fields (name, phone, email).
      parameters:
      - description: Profile Update Parameters
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateUserParams'
      produces:
      - application/json
      responses:
        "200":
          description: Updated user object
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Validation error for provided parameters
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to update profile
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update User Profile
      tags:
      - User
securityDefinitions:
  BearerAuth:
    description: 'Enter token in format: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    description: Access token automatically extracted from httpOnly Cookies
    in: cookie
    name: access_token
    type: apiKey
swagger: "2.0"
